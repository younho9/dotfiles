# Catppuccin Mocha (mauve accent) — https://github.com/catppuccin/lazygit
gui:
  # Nerd Font 아이콘 (ghostty에 Nerd Font 적용되어 있어야 정상 표시)
  nerdFontsVersion: "3"
  showFileTree: true
  showIcons: true
  border: rounded
  theme:
    activeBorderColor:
      - "#cba6f7" # mauve
      - bold
    inactiveBorderColor:
      - "#6c7086" # overlay0
    searchingActiveBorderColor:
      - "#f9e2af" # yellow
    optionsTextColor:
      - "#89b4fa" # blue
    selectedLineBgColor:
      - "#313244" # surface0
    inactiveViewSelectedLineBgColor:
      - "#1e1e2e" # base
    cherryPickedCommitBgColor:
      - "#45475a" # surface1
    cherryPickedCommitFgColor:
      - "#cba6f7" # mauve
    markedBaseCommitBgColor:
      - "#45475a" # surface1
    markedBaseCommitFgColor:
      - "#f9e2af" # yellow
    unstagedChangesColor:
      - "#f38ba8" # red
    defaultFgColor:
      - "#cdd6f4" # text
  authorColors:
    "*": "#b4befe" # lavender
git:
  pagers:
    - # ~/.gitconfig 의 delta 설정(navigate/line-numbers/side-by-side)을 그대로 연동.
      colorArg: always
      pager: delta --dark --paging=never
